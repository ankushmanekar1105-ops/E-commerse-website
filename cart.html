<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="../Style-Files/Cart.css">
    <link rel="stylesheet" href="../Style-Files/style.css">
</head>
<body>
     <header>
        <div class="addnav"></div>
    </header>
    <main class="main-body">
        <h2 class="cart-heading">Your Shopping Cart</h2>

        <div class="cart-container"></div>
        <p class="empty-cart-message">.</p>

            <div class="cart-summary">
                <div class="cart-count">
                    <h2>Cart Summary</h2>
                    <p>Total Items: <span id="total-items">0</span></p>
                </div>
                <div class="cart-price">
                    <h2>Total Price: $<span id="total-price">0.00</span></h2>
                    <button class="checkout-btn" type="button">Checkout</button>
                </div>
            </div>

    </main>

    <footer class="footer"></footer>

</body>
<script src="Script-Files/cart.js"></script>
<script src="Script-Files/Common.js"></script>
</html>
