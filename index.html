<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="style-files/style.css">
    <link rel="stylesheet" href="style-files/Index.css">
</head>

<body>
    <header>
        <div class="addnav"></div>
    </header>

    <main class="index-main">
        <section class="hero">
            <img src="assets/header.png" alt="Image 1" width="100%">
            <h2>Welcome to Our E-Commerce Store</h2>
        </section>

        <div class="lod-products"></div>

        <section class="categories">
            <span id="back-button"></span>
            <h3 id="categorieshed">Categories</h3>
            <div class="categerise-container">
                <div class="categerise-card">
                    <img class="cateimg" src="assets/beauty.png" alt="Image 1" width="25%">
                    <div id="beauty" class="data">
                        <span>
                            <h4 class="catetitle">Beauty Products</h4>
                            <p class="categri">Glow Better, Feel Better</p>
                        </span>
                        <button class="view-btn" type="button"><strong class="beauty">Explore More >></strong></button>
                    </div>

                </div>
                <div class="categerise-card">
                    <img class="cateimg" src="assets/furniture.png" alt="Image 1" width="25%">
                    <div id="furniture" class="data">
                        <span>
                            <h4 class="catetitle">Furniture</h4>
                            <p class="categri">Design Your Comfort</p>
                        </span>
                        <button class="view-btn" type="button"><strong class="furniture">Explore
                                More>></strong></button>
                    </div>

                </div>
                <div class="categerise-card">
                    <img class="cateimg"
                        src="https://cdn.pixabay.com/photo/2024/03/26/11/57/supermarket-8656652_1280.jpg" alt="Image 1"
                        width="25%">
                    <div id="groceries" class="data">
                        <span>
                            <h4 class="catetitle">Groceries</h4>
                            <p class="categri">Fresh & Healthy</p>
                        </span>
                        <button class="view-btn" type="button"><strong class="groceries">Explore More
                                >></strong></button>
                    </div>

                </div>
                <div class="categerise-card">
                    <img class="cateimg" src="assets/mobile.png" alt="Image 1" width="25%">
                    <div id="smartphones" class="data">
                        <span>
                            <h4 class="catetitle">Smartphones</h4>
                            <p class="categri">Stay Connected</p>
                        </span>
                        <button class="view-btn" type="button"><strong class="smartphones">Explore More
                                >></strong></button>
                    </div>

                </div>
            </div>
            <div class="categri-res"></div>

        </section>

    </main>

    <footers class="footer"></footer>

</body>
<script src="script-files/index.js"></script>
<script src="script-files/Common.js"></script>

</html>
